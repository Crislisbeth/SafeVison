<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeVision - Detección</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">🛡️</div>
                <h2>SafeVision</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="nav-icon">📊</span>
                    Dashboard
                </a>
                <a href="/live" class="nav-item">
                    <span class="nav-icon">📹</span>
                    Cámara en Vivo
                </a>
                <div class="nav-spacer"></div>
                <a href="#" class="nav-item" onclick="logout();return false;">
                    <span class="nav-icon">🚪</span>
                    Cerrar Sesión
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="name" id="userName">Administrador</div>
                        <div class="role" id="userRole">admin</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
                    <h1>🔍 Detalle de Detección</h1>
                </div>
                <div class="header-right">
                    <a href="/dashboard" class="btn btn-secondary btn-sm">← Volver al Dashboard</a>
                </div>
            </header>

            <div class="page-content">
                <div class="detection-layout" id="detectionContent">
                    <!-- Evidence Image -->
                    <div class="evidence-container slide-up">
                        <div class="evidence-image-wrapper">
                            <img id="evidenceImage" src="" alt="Evidencia de detección">
                        </div>
                        <div class="evidence-footer">
                            <span style="font-size:0.85rem; color:var(--text-secondary);" id="evidenceCamera">Cámara:
                                --</span>
                            <span class="badge" id="evidenceAlert">--</span>
                        </div>
                    </div>

                    <!-- Detail Sidebar -->
                    <div class="detail-sidebar slide-up">
                        <!-- Detection Info -->
                        <div class="detail-card">
                            <h3>Información</h3>
                            <div class="detail-item">
                                <span class="label">Cámara</span>
                                <span class="value" id="detCamera">--</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">ID Cámara</span>
                                <span class="value" id="detCameraId">--</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Fecha</span>
                                <span class="value" id="detDate">--</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Hora</span>
                                <span class="value" id="detTime">--</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Nivel de Alerta</span>
                                <span class="value" id="detAlert">--</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Estado</span>
                                <span class="value" id="detStatus">--</span>
                            </div>
                        </div>

                        <!-- Detection Results -->
                        <div class="detail-card">
                            <h3>Resultados de Detección</h3>
                            <div class="detection-results" id="detResults">
                                <p style="color:var(--text-muted); font-size:0.9rem;">Cargando...</p>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="detail-card">
                            <h3>Acciones</h3>
                            <div style="display:flex; flex-direction:column; gap:10px;">
                                <a href="/dashboard" class="btn btn-secondary" style="text-align:center;">
                                    ← Volver al Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/detection.js"></script>
</body>

</html>
