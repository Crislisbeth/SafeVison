<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SafeVision - Sistema de detección de mascarillas y cascos en entornos institucionales">
    <title>SafeVision - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">🛡️</div>
            <h1>SafeVision</h1>
            <p>Sistema de Detección de Seguridad</p>
        </div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input
                    type="text"
                    id="username"
                    class="form-input"
                    placeholder="Ingrese su usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="Ingrese su contraseña"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span id="loginText">INICIAR SESIÓN</span>
                <div class="spinner" id="loginSpinner" style="display:none;"></div>
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:0.78rem; color:var(--text-muted);">
            Acceso exclusivo para personal autorizado
        </p>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
